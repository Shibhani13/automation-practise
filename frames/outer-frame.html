<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outer Frame</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    .box { border: 1px solid #ccc; padding: 12px; }
    iframe { width: 100%; min-height: 220px; margin-top: 12px; border: 1px dashed #4caf50; }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
    }
    button:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="box">
    <h3>Outer Frame</h3>
    <button id="outer-frame-btn">Outer frame action</button>
    <p id="outer-frame-message">Outer frame ready</p>
    <iframe id="inner-frame" title="Inner frame" src="inner-frame.html"></iframe>
  </div>
</body>
</html>
