<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Single Frame</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    button {
      margin-top: 8px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
    }
    button:hover { background-color: #1d4ed8; }
    #iframe-message { color: #166534; }
  </style>
</head>
<body>
  <h3 style="color:#2563eb;">This is a single iframe</h3>
  <button id="iframe-btn">Inside iframe button</button>
  <p id="iframe-message">Waiting for click...</p>
</body>
</html>
