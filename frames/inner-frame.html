<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inner Frame</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; border: 1px dashed #4caf50; }
    img { display: block; margin-top: 8px; }
    a { display: inline-block; margin-top: 8px; }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
    }
    button:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>
  <h4>Inner Frame</h4>
  <button id="inner-frame-btn">Inner frame action</button>
  <p id="inner-frame-message">Inner frame ready</p>
  <a id="inner-frame-link" href="#">Inner frame link</a><br>
  <img id="inner-frame-image" src="../images/test_image_2.png" alt="Inner frame test image" width="100" height="100"><br>
  <button id="inner-frame-modal">Open inner modal</button>
</body>
</html>
